version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: go2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go2_dev
    ports:
      - "5432:5432"
    volumes:
      - go2_pg_data:/var/lib/postgresql/data

volumes:
  go2_pg_data:

